name: Unit Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Authenticate NuGet
        run: |
          dotnet nuget update source "GitHub-KO.BuildingBlocks" \
            --username "komeilshahmoradi" \
            --password "${{ secrets.GH_PACKAGES_TOKEN }}" \
            --store-password-in-clear-text \
            --configfile nuget.config

      - name: Restore dependencies
        run: dotnet restore Wallet.slnx

      - name: Build
        run: dotnet build Wallet.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Wallet.slnx --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Test Report
        uses: dorny/test-reporter@v1.9.1
        if: always()
        with:
          name: .NET Tests Report
          path: TestResults/test-results.trx
          reporter: dotnet-trx

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4.6.0
        with:
          name: test-results
          path: TestResults
